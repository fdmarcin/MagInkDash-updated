<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <link rel="stylesheet" href="css/styles.css">
        <link rel="stylesheet" href="css/dashboard.css">
    </head>
    <body>
        <div class="screen">
            <div class="grid">

                <div class="day-col">
                    <div class="day-header">
                        <div class="today-label">Today</div>
                        <div class="day-name">{weekday}</div>
                        <div class="day-number">{day}</div>
                        <div class="day-month">{month}</div>
                    </div>
                    <ol class="events list-unstyled {today_empty}">
                        {events_today}
                    </ol>
                </div>

                <div class="day-col">
                    <div class="day-header">
                        <div class="day-name">{tomorrow}</div>
                        <div class="day-number">{tomorrow_day}</div>
                        <div class="day-month">{tomorrow_month}</div>
                    </div>
                    <ol class="events list-unstyled {tomorrow_empty}">
                        {events_tomorrow}
                    </ol>
                </div>

                <div class="day-col">
                    <div class="day-header">
                        <div class="day-name">{dayafter}</div>
                        <div class="day-number">{dayafter_day}</div>
                        <div class="day-month">{dayafter_month}</div>
                    </div>
                    <ol class="events list-unstyled {dayafter_empty}">
                        {events_dayafter}
                    </ol>
                </div>

            </div>
        </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {{
            document.querySelectorAll(".events").forEach(function (container) {{
                var minSize = 12;
                var step = 1;
                while (container.scrollHeight > container.clientHeight) {{
                    var titles = container.querySelectorAll(".event-title");
                    var times = container.querySelectorAll(".event-time");
                    if (titles.length === 0) break;
                    var curr = parseFloat(window.getComputedStyle(titles[0]).fontSize);
                    if (curr <= minSize) break;
                    var next = Math.max(curr - step, minSize);
                    titles.forEach(function (el) {{ el.style.fontSize = next + "px"; }});
                    times.forEach(function (el) {{ el.style.fontSize = Math.max(next - 4, minSize) + "px"; }});
                }}
            }});
        }});
    </script>
    </body>
</html>
