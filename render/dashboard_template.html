<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="css/bootstrap.min.css">
        <link rel="stylesheet" href="css/styles.css">

        <link rel="stylesheet" href="css/dashboard.css">
    </head>
    <body style="background: white;">
        <div class="container">
            <div class="row justify-content-center align-items-center dashboard-row">
                <div class="col-md-5 left-panel">
                    <div class="row">
                        <div class="col-md-6 date-padding">
                            <div class="text-right">
                                <p class="big-day">{day}</p>
                            </div>
                        </div>
                        <div class="col-md-6 date-padding">
                            <div class="col-md-12"  style="height: 130px"></div>
                            <div>
                                <p class="weekday-text">{weekday}<br />{month}</p>
                            </div>
                        </div>
                    </div>
                    <div class="today-events">
                        <h2>Today</h2>
                        <ol class="list-unstyled">
                            {events_today}
                        </ol>
                    </div>
                </div>
                <div class="col-md-6 offset-md-1 right-panel">
                    <div class="future-day">
                        <h2>{tomorrow}</h2>
                        <ol class="list-unstyled">
                            {events_tomorrow}
                        </ol>
                    </div>
                    <div class="future-day">
                        <h2>{dayafter}</h2>
                        <ol class="list-unstyled">
                            {events_dayafter}
                        </ol>
                    </div>
                </div>
            </div>
        </div>
    </body>
</html>
